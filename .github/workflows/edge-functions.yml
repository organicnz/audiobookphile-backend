name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/**"
  pull_request:
    branches:
      - main
    paths:
      - "supabase/**"
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v1.x

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Lint Deno Code
        run: |
          cd supabase/functions
          deno lint
          deno fmt --check

      - name: Lint Database Migrations
        run: |
          supabase db lint
          supabase test db

      - name: Enforce Zero-Downtime Migrations (Squawk)
        uses: sbdchd/squawk-action@v2
        with:
          pattern: supabase/migrations/*.sql

  deploy:
    needs: lint
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v7

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Push Database Migrations
        run: |
          supabase db push --project-ref $SUPABASE_PROJECT_ID

      - name: Dynamically Deploy Edge Functions
        run: |
          # Iterate over all directories in supabase/functions
          for dir in supabase/functions/*/; do
            # Remove trailing slash and 'supabase/functions/' prefix
            func_name=$(basename "$dir")

            # Skip the _shared directory
            if [ "$func_name" != "_shared" ]; then
              echo "🚀 Deploying function: $func_name"
              supabase functions deploy "$func_name" --project-ref $SUPABASE_PROJECT_ID
            fi
          done
